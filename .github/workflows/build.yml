name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  # 构建 DEB 包
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make

      - name: Build deb
        run: make deb

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: organize-deb
          path: organize_*.deb

  # 创建 GitHub Release
  create-release:
    needs: [build-deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: organize-deb
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/organize_*.deb
          generate_release_notes: true

  # 自动推送 AUR
  publish-aur:
    needs: [create-release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Prepare PKGBUILD for AUR
        run: |
          # 复制 PKGBUILD 到工作目录
          cp aur/PKGBUILD .

          # 替换版本号
          sed -i "s/pkgver=.*/pkgver=${{ steps.version.outputs.VERSION }}/" PKGBUILD

          # 更新 source 中的版本号（如果使用 tag）
          sed -i "s|organize/archive/.*.tar.gz|organize/archive/v${{ steps.version.outputs.VERSION }}.tar.gz|" PKGBUILD

          # 生成 .SRCINFO
          makepkg --printsrcinfo > .SRCINFO

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: organize-git
          pkgbuild: ./PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ steps.version.outputs.VERSION }}"
