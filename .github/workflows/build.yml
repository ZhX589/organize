name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make
      - name: Build deb
        run: make deb
      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: organize-deb
          path: organize_*.deb

  create-release:
    needs: [build-deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: organize-deb
          path: ./artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/organize_*.deb
          generate_release_notes: true

  publish-aur:
    needs: [create-release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Prepare PKGBUILD and .SRCINFO
        run: |
          cp aur/PKGBUILD .
          sed -i "s/pkgver=.*/pkgver=${{ steps.version.outputs.VERSION }}/" PKGBUILD

          cat > .SRCINFO << 'EOF'
pkgbase = organize-git
	pkgdesc = File organizer by extension - Git version
	pkgver = VERSION_PLACEHOLDER
	pkgrel = 1
	url = https://github.com/ZhX589/organize
	arch = any
	license = MIT
	makedepends = git
	makedepends = make
	depends = bash
	depends = coreutils
	source = organize-git::git+https://github.com/ZhX589/organize.git
	sha256sums = SKIP
	provides = organize
	conflicts = organize
	conflicts = organize-bin

pkgname = organize-git
EOF
          # 替换版本号占位符
          sed -i "s/VERSION_PLACEHOLDER/${{ steps.version.outputs.VERSION }}/" .SRCINFO

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: organize-git
          pkgbuild: ./PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ steps.version.outputs.VERSION }}"
